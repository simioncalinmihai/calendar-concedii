<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#fff;font-size:9px}
.app{padding:.4rem}
.logobar{display:flex;justify-content:center;align-items:center;gap:24px;padding:.4rem;border-bottom:2px solid #bbb;margin-bottom:.5rem;background:#f5f5f5;border-radius:3px}
.logobar img{height:38px;object-fit:contain}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem;flex-wrap:wrap;gap:4px}
.title{font-size:11px;font-weight:700;color:#111}
.controls{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
select,button,input[type=text]{font-size:10px;padding:2px 5px;border-radius:2px;border:1px solid #999;background:#fff;color:#111;cursor:pointer;height:20px}
input[type=text]{cursor:text;width:120px}
button:hover{background:#eee}
.btn-unlock{background:#fde8e8;color:#900;border-color:#c00}
.btn-export{background:#e8f5e9;color:#2e7d32;border-color:#4caf50}
.btn-json{background:#fff8e1;color:#e65100;border-color:#ff9800}
.btn-import{background:#f3e5f5;color:#6a1b9a;border-color:#9c27b0}
.save-ind{font-size:9px;color:#2e7d32;font-style:italic;transition:opacity .5s}
.filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.3rem;align-items:center}
.filters label{font-size:9px;color:#666}
.legend{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.25rem;align-items:center}
.leg{display:flex;align-items:center;gap:2px;font-size:8px;color:#444}
.ld{width:22px;height:14px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border:1px solid #888}
.hint{font-size:8px;color:#aaa;margin-bottom:.25rem}
.tw{overflow-x:auto;border:2px solid #555;border-radius:3px}
table{border-collapse:collapse;table-layout:fixed}
thead th{position:sticky;top:0;z-index:4;background:#ccc;border:1px solid #777;font-weight:700;color:#111;overflow:hidden;padding:0;white-space:nowrap}
th.cn{position:sticky;left:0;z-index:5;background:#ccc;width:200px;text-align:left;padding-left:4px;font-size:8px}
th.cd{position:sticky;left:200px;z-index:5;background:#ccc;width:52px;text-align:left;padding-left:2px;font-size:8px}
th.ch{width:22px;text-align:center;font-size:7px;line-height:1.15;padding:1px 0}
th.ct{width:22px;text-align:center;font-size:7px;padding:0}
tbody td,tfoot td{border:1px solid #bbb;padding:0;height:16px;overflow:hidden;vertical-align:middle}
td.cn{position:sticky;left:0;z-index:2;background:#fff;width:200px;font-size:8px;font-weight:700;padding-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid #bbb}
td.cd{position:sticky;left:200px;z-index:2;background:#fff;width:52px;font-size:8px;padding-left:2px;border:1px solid #bbb}
td.ch{width:22px;text-align:center;border:1px solid #bbb;height:16px;overflow:hidden}
td.cwe{background:#ddd!important}
td.ct{width:22px;font-weight:700;font-size:8px;text-align:center;border:1px solid #bbb;padding:0;color:#111}
tr:nth-child(even) td.cn,tr:nth-child(even) td.cd{background:#f5f5f5}
.ei{display:block;width:100%;height:100%;border:none;outline:none;background:transparent;text-align:center;font-size:8px;font-weight:700;padding:0;margin:0;cursor:text;color:inherit;text-transform:uppercase;font-family:Arial,sans-serif;line-height:16px}
.ei:focus{background:rgba(255,255,255,0.3)!important;color:#000!important;box-shadow:inset 0 0 0 2px #1565C0;outline:none}
.lk{display:block;width:100%;height:16px;text-align:center;line-height:16px;font-size:8px;font-weight:700;cursor:pointer;color:inherit;font-family:Arial,sans-serif}
.bco{background:#90CAF9!important;color:#0D47A1!important}
.bcm{background:#EF9A9A!important;color:#7f0000!important}
.ban{background:#FFCC80!important;color:#4e2000!important}
.bzero{background:#F48FB1!important;color:#4a0022!important}
.bh5{background:#CE93D8!important;color:#1a0030!important}
.bzl{background:#A5D6A7!important;color:#1b3a1b!important}
tfoot td{background:#ddd;border:1px solid #888;font-weight:700;font-size:8px;text-align:center;color:#111}
tfoot td.cn{background:#ccc;text-align:left;padding-left:4px;position:sticky;left:0;z-index:2;font-size:8px}
tfoot td.cd{background:#ccc;position:sticky;left:200px;z-index:2}
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
.mb.open{display:flex}
.md{background:#fff;border-radius:6px;border:1px solid #777;padding:1rem;width:280px}
.md h3{font-size:12px;font-weight:700;margin-bottom:.3rem}
.md p{font-size:10px;color:#555;margin-bottom:.5rem;line-height:1.4}
.md input[type=password]{width:100%;margin-bottom:.3rem;font-size:11px;padding:4px;border-radius:3px;border:1px solid #aaa;height:auto}
.mf{font-size:9px;color:#c00;min-height:11px;margin-bottom:.3rem}
.mbb{display:flex;gap:5px;justify-content:flex-end}
.bp{background:#e3f2fd;color:#0d47a1;border-color:#1565C0}
.rpt-sec{margin-top:.5rem;border:2px solid #555;border-radius:3px;overflow:hidden}
.rpt-title{background:#ccc;padding:.25rem .5rem;font-size:10px;font-weight:700;color:#111;border-bottom:1px solid #999}
.rt{width:100%;border-collapse:collapse;font-size:9px}
.rt th{background:#ccc;color:#111;font-weight:700;padding:2px 4px;text-align:center;border:1px solid #999;white-space:nowrap}
.rt th.ln{text-align:left;min-width:160px}
.rt td{padding:2px 4px;text-align:center;border:1px solid #ccc}
.rt td.ln{text-align:left;font-weight:700}
.rt tr:nth-child(even) td{background:#f5f5f5}
.rt .tr2 td{background:#bbdefb!important;color:#0d47a1!important;font-weight:700}
.z{color:#ddd}
</style></head><body>

// S = values, L = locked
const S={}, L={};

// ===== AUTO-SAVE to Firebase + localStorage fallback =====
let saveTimer=null;
let fbReady=false;
let ignoreFbUpdate=false;

function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{
      const save={};
      for(const [key,val] of Object.entries(S)) if(val) save[key]=val;
      const lsave={};
      for(const [key,val] of Object.entries(L)) if(val) lsave[key]=true;
      const payload={s:save,l:lsave,ts:Date.now()};
      localStorage.setItem(LS_KEY, JSON.stringify(payload));
      if(fbReady && window._fbSet){
        ignoreFbUpdate=true;
        window._fbSet(payload).then(()=>{
          showSaved('&#9729;&#65039; Salvat in cloud');
          setTimeout(()=>{ignoreFbUpdate=false;},1000);
        }).catch(e=>{
          ignoreFbUpdate=false;
          showSaved('Salvat local (cloud indisponibil)');
          console.warn('Firebase save failed:',e);
        });
      } else {
        showSaved('Salvat local');
      }
    } catch(e){console.warn('Save failed:',e);}
  },300);
}

function showSaved(msg){
  const el=document.getElementById('si');
  el.innerHTML=msg||'Salvat';
  el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';},2500);
}

function applyCloudData(saved){
  if(!saved) return false;
  for(let m=0;m<12;m++) for(let r=0;r<EMP.length;r++)
    for(let d=1;d<=DIM[m];d++){S[k(m,r,d)]="";L[k(m,r,d)]=false;}
  for(let m=0;m<12;m++){
    const md=EXCEL_DATA[m]||{};
    for(const [ri,entries] of Object.entries(md)){
      const r=+ri;
      for(const [val,day] of entries){S[k(m,r,day)]=val;L[k(m,r,day)]=true;}
    }
  }
  if(saved.s) for(const [key,val] of Object.entries(saved.s)) S[key]=val;
  if(saved.l) for(const [key] of Object.entries(saved.l)) L[key]=true;
  return true;
}

function loadFromStorage(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const saved=JSON.parse(raw);
    applyCloudData(saved);
    return true;
  } catch(e){return false;}
}

function initFirebase(){
  if(!window._fbListen){
    setTimeout(initFirebase, 300);
    return;
  }
  fbReady=true;
  const el=document.getElementById('si');
  el.innerHTML='&#9203; Se conecteaza la cloud...';
  el.style.opacity='1';

  window._fbListen((data)=>{
    if(ignoreFbUpdate) return;
    if(data){
      applyCloudData(data);
      localStorage.setItem(LS_KEY, JSON.stringify(data));
      curM===12?renderReport():renderM(curM);
      el.innerHTML='&#9729;&#65039; Sincronizat cu cloud';
      el.style.opacity='1';
      setTimeout(()=>{el.style.opacity='0';},3000);
    } else {
      loadFromStorage();
      curM===12?renderReport():renderM(curM);
      el.innerHTML='&#9729;&#65039; Conectat (fara date cloud)';
      el.style.opacity='1';
      setTimeout(()=>{el.style.opacity='0';},3000);
    }
  });
}

function initState(){
  // Init all cells empty+unlocked
  for(let m=0;m<12;m++) for(let r=0;r<EMP.length;r++)
    for(let d=1;d<=DIM[m];d++){S[k(m,r,d)]="";L[k(m,r,d)]=false;}

  // Load Excel base data
  for(let m=0;m<12;m++){
    const md=EXCEL_DATA[m]||{};
    for(const [ri,entries] of Object.entries(md)){
      const r=+ri;
      for(const [val,day] of entries){
        S[k(m,r,day)]=val;
        L[k(m,r,day)]=true;
      }
    }
  }

  // Incarca din localStorage ca fallback imediat (afisare rapida)
  loadFromStorage();
  // Conecteaza Firebase - va sincroniza datele cloud in timp real
  initFirebase();
}

// ===== Export/Import JSON =====
function exportJSON(){
  const save={};
  for(const [key,val] of Object.entries(S)) if(val) save[key]=val;
  const lsave={};
  for(const [key,val] of Object.entries(L)) if(val) lsave[key]=true;
  const blob=new Blob([JSON.stringify({s:save,l:lsave,ts:Date.now()},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='concedii2026_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importJSON(inp){
  const file=inp.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const saved=JSON.parse(e.target.result);
      // Reset state
      for(let m=0;m<12;m++) for(let r=0;r<EMP.length;r++)
        for(let d=1;d<=DIM[m];d++){S[k(m,r,d)]="";L[k(m,r,d)]=false;}
      // Load Excel base
      for(let m=0;m<12;m++){
        const md=EXCEL_DATA[m]||{};
        for(const [ri,entries] of Object.entries(md)){
          const r=+ri;
          for(const [val,day] of entries){S[k(m,r,day)]=val;L[k(m,r,day)]=true;}
        }
      }
      // Apply imported
      if(saved.s) for(const [key,val] of Object.entries(saved.s)) S[key]=val;
      if(saved.l) for(const [key] of Object.entries(saved.l)) L[key]=true;
      // Also save to localStorage
      localStorage.setItem(LS_KEY,JSON.stringify(saved));
      renderM(curM);
      const el=document.getElementById('si');
      el.textContent='✓ Date importate cu succes';
      el.style.opacity='1';
      setTimeout(()=>{el.style.opacity='0';},3000);
    } catch(err){alert('Fișier JSON invalid: '+err.message);}
  };
  reader.readAsText(file);
  inp.value='';
}

function nrm(raw){
  const v=raw.trim().toUpperCase();
  if(v==="0.5"||v===",5"||v===".5"||v==="05") return "0.5";
  return VALID.includes(v)?v:null;
}
function calcRow(m,r){
  let co=0,cm=0,an=0,nn=0,hf=0,zl=0;
  for(let d=1;d<=DIM[m];d++){const v=S[k(m,r,d)]||"";
    if(v==="CO")co++;else if(v==="CM")cm++;else if(v==="AN")an++;
    else if(v==="0")nn++;else if(v==="0.5")hf+=0.5;else if(v==="ZL")zl++;}
  return{co,cm,an,nn,hf,zl,total:+(co+cm+an+nn+hf).toFixed(1)};
}
function calcAnn(r){
  let co=0,cm=0,an=0,nn=0,hf=0,zl=0;
  for(let m=0;m<12;m++){const t=calcRow(m,r);co+=t.co;cm+=t.cm;an+=t.an;nn+=t.nn;hf+=t.hf;zl+=t.zl;}
  return{co,cm,an,nn,hf:+hf.toFixed(1),zl,total:+(co+cm+an+nn+hf).toFixed(1)};
}

function applyF(){fN=document.getElementById("fName").value;fD=document.getElementById("fDept").value;curM===12?renderReport():renderM(curM);}
function clearF(){document.getElementById("fName").value="";document.getElementById("fDept").value="";fN="";fD="";curM===12?renderReport():renderM(curM);}
function setColor(td,val){VALID.forEach(t=>td.classList.remove(BGC[t]));if(val&&BGC[val])td.classList.add(BGC[val]);}
function pw(px){return `style="width:${px}px;min-width:${px}px;max-width:${px}px"`;}

function renderM(m){
  curM=m;document.getElementById("rpt").innerHTML="";
  const dim=DIM[m],wknd=getWE(m),DN=["D","L","M","Mi","J","V","S"],rows=vis();
  const totalW=WN+WD+dim*WC+7*WT;
  const tbl=document.getElementById("tbl");
  tbl.style.width=totalW+"px";

  let cg=`<colgroup><col ${pw(WN)}><col ${pw(WD)}>`;
  for(let d=1;d<=dim;d++) cg+=`<col ${pw(WC)}>`;
  for(let i=0;i<7;i++) cg+=`<col ${pw(WT)}>`;
  cg+=`</colgroup>`;

  let th=`<thead><tr><th class="cn" ${pw(WN)}>Nume angajat</th><th class="cd" ${pw(WD)}>Dept</th>`;
  for(let d=1;d<=dim;d++){
    const iW=wknd.includes(d);
    th+=`<th class="ch" ${pw(WC)} style="width:${WC}px;${iW?'color:#999':''}">${d}<br>${DN[new Date(2026,m,d).getDay()]}</th>`;
  }
  th+=`<th class="ct" ${pw(WT)}>CO</th><th class="ct" ${pw(WT)}>CM</th><th class="ct" ${pw(WT)}>AN</th><th class="ct" ${pw(WT)}>0</th><th class="ct" ${pw(WT)}>0.5</th><th class="ct" ${pw(WT)}>ZL</th><th class="ct" ${pw(WT)} style="color:#0d47a1">TOT</th></tr></thead>`;

  let tb="<tbody>";
  rows.forEach(({e,i:r})=>{
    const t=calcRow(m,r);
    tb+=`<tr><td class="cn" ${pw(WN)} title="${e.n}">${e.n}</td><td class="cd" ${pw(WD)}>${e.d}</td>`;
    for(let d=1;d<=dim;d++){
      const ky=k(m,r,d),v=S[ky]||"",iW=wknd.includes(d),lk=L[ky];
      const bg=v?(' '+(BGC[v]||'')):'';
      if(iW&&!v){
        tb+=`<td class="ch cwe" ${pw(WC)}></td>`;
      } else if(lk){
        tb+=`<td class="ch${bg}" ${pw(WC)}><span class="lk" onclick="clickLk(${m},${r},${d})">${v}</span></td>`;
      } else {
        tb+=`<td class="ch${iW?' cwe':''}${bg}" ${pw(WC)}><input class="ei" type="text" maxlength="3" value="${v}" data-m="${m}" data-r="${r}" data-d="${d}" onkeydown="onKD(event,this)" onblur="onBl(this)" oninput="onIn(this)"/></td>`;
      }
    }
    tb+=`<td class="ct" ${pw(WT)}>${t.co||""}</td><td class="ct" ${pw(WT)}>${t.cm||""}</td><td class="ct" ${pw(WT)}>${t.an||""}</td><td class="ct" ${pw(WT)}>${t.nn||""}</td><td class="ct" ${pw(WT)}>${t.hf||""}</td><td class="ct" ${pw(WT)}>${t.zl||""}</td><td class="ct" ${pw(WT)} style="color:#0d47a1">${t.total||""}</td></tr>`;
  });
  tb+="</tbody>";

  let tco=0,tcm=0,tan=0,tnn=0,thf=0,tzl=0;
  rows.forEach(x=>{const t=calcRow(m,x.i);tco+=t.co;tcm+=t.cm;tan+=t.an;tnn+=t.nn;thf+=t.hf;tzl+=t.zl;});
  const totT=+(tco+tcm+tan+tnn+thf).toFixed(1);
  let tf=`<tfoot><tr><td class="cn" ${pw(WN)}>TOTAL LUNA</td><td class="cd" ${pw(WD)}></td>`;
  for(let d=1;d<=dim;d++) tf+=`<td class="ch${wknd.includes(d)?' cwe':''}" ${pw(WC)}></td>`;
  tf+=`<td class="ct" ${pw(WT)}>${tco||""}</td><td class="ct" ${pw(WT)}>${tcm||""}</td><td class="ct" ${pw(WT)}>${tan||""}</td><td class="ct" ${pw(WT)}>${tnn||""}</td><td class="ct" ${pw(WT)}>${thf||""}</td><td class="ct" ${pw(WT)}>${tzl||""}</td><td class="ct" ${pw(WT)} style="color:#0d47a1">${totT||""}</td></tr></tfoot>`;
  tbl.innerHTML=cg+th+tb+tf;
}

function onIn(inp){
  const raw=inp.value.trim().toUpperCase();
  const n=(raw==="0.5"||raw===",5"||raw===".5"||raw==="05")?"0.5":VALID.includes(raw)?raw:null;
  setColor(inp.closest('td'),n);
}

function commit(inp){
  const m=+inp.dataset.m,r=+inp.dataset.r,d=+inp.dataset.d,ky=k(m,r,d);
  const n=nrm(inp.value);
  if(n&&n!==""){
    S[ky]=n; L[ky]=true;
    autoSave(); // ← AUTOSAVE imediat după editare
    renderM(m);
  } else {
    inp.value=S[ky]||"";
    setColor(inp.closest('td'),S[ky]||null);
  }
}
function onKD(e,inp){
  if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();commit(inp);}
  if(e.key==="Escape"){const p=S[k(+inp.dataset.m,+inp.dataset.r,+inp.dataset.d)]||"";inp.value=p;setColor(inp.closest('td'),p||null);inp.blur();}
}
function onBl(inp){commit(inp);}

function clickLk(m,r,d){
  pend={m,r,d};
  document.getElementById("mtitle").textContent="Deblocare celulă";
  document.getElementById("mdesc").textContent=EMP[r].n+" — ziua "+d+" "+MONTHS[m];
  document.getElementById("pw").value="";document.getElementById("mf").textContent="";
  document.getElementById("modal").classList.add("open");
  setTimeout(()=>document.getElementById("pw").focus(),80);
}
function openUnlockGlobal(){
  pend=null;
  document.getElementById("mtitle").textContent="Acces manager";
  document.getElementById("mdesc").textContent="Introdu parola managerului.";
  document.getElementById("pw").value="";document.getElementById("mf").textContent="";
  document.getElementById("modal").classList.add("open");
  setTimeout(()=>document.getElementById("pw").focus(),80);
}
function closeM(){document.getElementById("modal").classList.remove("open");pend=null;}
function confirmPw(){
  if(document.getElementById("pw").value!==PASS){
    document.getElementById("mf").textContent="Parolă incorectă.";
    document.getElementById("pw").value="";document.getElementById("pw").focus();return;
  }
  if(pend){
    const{m,r,d}=pend;
    S[k(m,r,d)]="";L[k(m,r,d)]=false;
    autoSave(); // ← AUTOSAVE după deblocare+ștergere
    pend=null;document.getElementById("modal").classList.remove("open");renderM(m);
  } else document.getElementById("modal").classList.remove("open");
}

function renderReport(){
  curM=12;
  const rows=vis();
  const tbl=document.getElementById("tbl");tbl.innerHTML="";tbl.style.width="";
  let h=`<div class="rpt-sec"><div class="rpt-title">📊 Raport anual 2026 (${rows.length} angajați)</div><div style="overflow-x:auto"><table class="rt"><thead><tr><th class="ln">Nume angajat</th><th>Dept</th>`;
  MONTHS.forEach(mn=>h+=`<th style="font-size:7px">${mn.substring(0,3)}</th>`);
  h+=`<th>CO</th><th>CM</th><th>AN</th><th>0</th><th>0.5</th><th>ZL</th><th style="color:#0d47a1">TOT</th></tr></thead><tbody>`;
  let tco=0,tcm=0,tan=0,tnn=0,thf=0,tzl=0,ttot=0,mT=Array(12).fill(0);
  rows.forEach(x=>{
    const a=calcAnn(x.i);tco+=a.co;tcm+=a.cm;tan+=a.an;tnn+=a.nn;thf+=a.hf;tzl+=a.zl;ttot+=a.total;
    h+=`<tr><td class="ln">${x.e.n}</td><td style="text-align:center">${x.e.d}</td>`;
    for(let m=0;m<12;m++){const t=calcRow(m,x.i);mT[m]+=t.total;h+=`<td class="${t.total?'':'z'}">${t.total||""}</td>`;}
    h+=`<td>${a.co||""}</td><td>${a.cm||""}</td><td>${a.an||""}</td><td>${a.nn||""}</td><td>${a.hf||""}</td><td>${a.zl||""}</td><td style="color:#0d47a1;font-weight:700">${a.total||""}</td></tr>`;
  });
  h+=`<tr class="tr2"><td class="ln">TOTAL</td><td></td>`;
  mT.forEach(t=>h+=`<td>${+t.toFixed(1)||""}</td>`);
  h+=`<td>${tco}</td><td>${tcm}</td><td>${tan}</td><td>${tnn}</td><td>${+thf.toFixed(1)}</td><td>${tzl}</td><td>${+ttot.toFixed(1)}</td></tr></tbody></table></div></div>`;
  h+=`<div class="rpt-sec" style="margin-top:.4rem"><div class="rpt-title">Totale pe lună</div><div style="overflow-x:auto"><table class="rt"><thead><tr><th class="ln">Luna</th><th>CO</th><th>CM</th><th>AN</th><th>0</th><th>0.5</th><th>ZL</th><th style="color:#0d47a1">TOTAL</th></tr></thead><tbody>`;
  let gc=0,gm=0,ga=0,gn=0,gh=0,gz=0,gt=0;
  MONTHS.forEach((mn,mm)=>{
    let co=0,cm=0,an=0,nn=0,hf=0,zl=0;
    rows.forEach(x=>{const t=calcRow(mm,x.i);co+=t.co;cm+=t.cm;an+=t.an;nn+=t.nn;hf+=t.hf;zl+=t.zl;});
    const tot=+(co+cm+an+nn+hf).toFixed(1);gc+=co;gm+=cm;ga+=an;gn+=nn;gh+=hf;gz+=zl;gt+=tot;
    h+=`<tr><td class="ln">${mn}</td><td>${co||""}</td><td>${cm||""}</td><td>${an||""}</td><td>${nn||""}</td><td>${hf||""}</td><td>${zl||""}</td><td style="color:#0d47a1;font-weight:700">${tot||""}</td></tr>`;
  });
  h+=`<tr class="tr2"><td class="ln">TOTAL AN</td><td>${gc}</td><td>${gm}</td><td>${ga}</td><td>${gn}</td><td>${+gh.toFixed(1)}</td><td>${gz}</td><td>${+gt.toFixed(1)}</td></tr></tbody></table></div></div>`;
  document.getElementById("rpt").innerHTML=h;
}

function exportXL(){
  const wb=XLSX.utils.book_new();
  MONTHS.forEach((mn,m)=>{
    const dim=DIM[m];
    const rows2=[["Dept","Nume",...Array.from({length:dim},(_,i)=>i+1),"CO","CM","AN","0","0.5","ZL","TOT"]];
    EMP.forEach((e,r)=>{const row=[e.d,e.n];for(let d=1;d<=dim;d++) row.push(S[k(m,r,d)]||"");const t=calcRow(m,r);row.push(t.co,t.cm,t.an,t.nn,t.hf,t.zl,t.total);rows2.push(row);});
    const ws=XLSX.utils.aoa_to_sheet(rows2);ws["!cols"]=[{wch:8},{wch:32},...Array(dim).fill({wch:4}),...Array(7).fill({wch:5})];
    XLSX.utils.book_append_sheet(wb,ws,mn);
  });
  XLSX.writeFile(wb,"Calendar_Concedii_2026.xlsx");
}

const msEl=document.getElementById("ms");
MONTHS.forEach((n,i)=>{const o=document.createElement("option");o.value=i;o.textContent=n;if(i===0)o.selected=true;msEl.appendChild(o);});
const oR=document.createElement("option");oR.value=12;oR.textContent="📊 Raport Anual";msEl.appendChild(oR);
msEl.addEventListener("change",e=>{const v=+e.target.value;v===12?renderReport():renderM(v);});
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")confirmPw();});

initState();
renderM(0);
</script>
